    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const discordCard = document.getElementById('discordCard');
            const discordHandle = document.getElementById('discordHandle');
            const discordAction = document.getElementById('discordAction');

            discordCard.addEventListener('click', () => {
                navigator.clipboard.writeText(discordHandle.textContent).then(() => {
                    const originalText = discordAction.innerHTML;
                    discordAction.textContent = "Copied to clipboard!";
                    discordCard.style.borderColor = "#22c55e";
                    
                    setTimeout(() => {
                        discordAction.innerHTML = originalText;
                        discordCard.style.borderColor = "";
                    }, 2000);
                });
            });
        });
    </script>
